<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Calc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="header-icons">
                <div class="icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
                <div class="icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>
                </div>
            </div>
            <div class="text-container">
                <div class="input-line">
                    <span id="display">0</span>
                    <div class="cursor"></div>
                </div>
                <div id="preview" class="preview-result"></div>
            </div>
        </div>
        
        <div class="button-grid">
            <button class="btn top" onclick="clearDisplay()">C</button>
            <button class="btn top" onclick="appendToDisplay('%')">%</button>
            <button class="btn top" onclick="backspace()">⌫</button>
            <button class="btn side" onclick="appendToDisplay('/')">÷</button>
            
            <button class="btn num" onclick="appendToDisplay('7')">7</button>
            <button class="btn num" onclick="appendToDisplay('8')">8</button>
            <button class="btn num" onclick="appendToDisplay('9')">9</button>
            <button class="btn side" onclick="appendToDisplay('*')">×</button>
            
            <button class="btn num" onclick="appendToDisplay('4')">4</button>
            <button class="btn num" onclick="appendToDisplay('5')">5</button>
            <button class="btn num" onclick="appendToDisplay('6')">6</button>
            <button class="btn side" onclick="appendToDisplay('-')">−</button>
            
            <button class="btn num" onclick="appendToDisplay('1')">1</button>
            <button class="btn num" onclick="appendToDisplay('2')">2</button>
            <button class="btn num" onclick="appendToDisplay('3')">3</button>
            <button class="btn side" onclick="appendToDisplay('+')">+</button>
            
            <button class="btn num" onclick="toggleSign()">+/−</button>
            <button class="btn num" onclick="appendToDisplay('0')">0</button>
            <button class="btn num" onclick="appendToDisplay('.')">.</button>
            <button class="btn orange" onclick="calculate()">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
