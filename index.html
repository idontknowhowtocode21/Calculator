<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <style>
        :root {
            --bg-black: #000000;
            --btn-gray: #1c1c1e;
            --text-white: #ffffff;
            --text-dim: #8e8e93;
            --accent-orange: #f39c12;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-black);
            font-family: 'sans-serif-light', 'Roboto-Light', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar Icons */
        .top-nav {
            display: flex;
            justify-content: space-between;
            padding: 25px 20px 10px;
        }

        .icon-svg {
            width: 22px;
            height: 22px;
            fill: var(--text-dim);
        }

        /* Display Area */
        #display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 0 30px 40px 30px;
        }

        #result {
            font-size: 5rem;
            color: var(--text-white);
            font-weight: 200;
            word-break: break-all;
            text-align: right;
        }

        /* Keypad */
        #keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 15px;
            padding-bottom: 40px;
        }

        button {
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: none;
            background-color: var(--btn-gray);
            color: var(--text-white);
            font-size: 2rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        button:active {
            background-color: #3a3a3c;
        }

        .op-text { color: var(--accent-orange); font-size: 2.2rem; }
        .util-text { color: var(--text-dim); }
        .equals-btn { background-color: var(--accent-orange); color: white; }

        .backspace-svg {
            width: 28px;
            fill: var(--text-dim);
        }
    </style>
</head>
<body>
