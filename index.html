<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <style>
        :root {
            --bg-color: #000000;
            --btn-gray: #2c2c2c;
            --btn-light-gray: #7d7d7d;
            --btn-orange: #f39c12;
            --text-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 20px;
            color: var(--text-white);
        }

        #history {
            font-size: 1.5rem;
            color: #888;
            min-height: 1.6rem;
        }

        #result {
            font-size: 4rem;
            margin-top: 10px;
            word-wrap: break-word;
            max-width: 100%;
        }

        #keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 20px;
            padding-bottom: 40px;
        }

        button {
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: none;
            font-size: 1.8rem;
            color: var(--text-white);
            background-color: var(--btn-gray);
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.1s;
        }

        button:active {
            opacity: 0.7;
        }

        .op-btn {
            background-color: var(--btn-gray);
            color: var(--btn-orange);
            font-size: 2.2rem;
        }

        .util-btn {
            background-color: var(--btn-gray);
            color: #a5a5a5;
        }

        .equals {
            background-color: var(--btn-orange);
            color: white;
        }

        /* Specific for '0' if you want it wider, but the video uses a grid */
    </style>
</head>
<body>

<div id="display-container">
    <div id="history"></div>
    <div id="result">0</div>
</div>

<div id="keypad">
    <button class="util-btn" onclick="clearAll()">C</button>
    <button class="util-btn" onclick="append('%')">%</button>
    <button class="util-btn" onclick="backspace()">⌫</button>
    <button class="op-btn" onclick="append('÷')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="op-btn" onclick="append('×')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="op-btn" onclick="append('-')">-</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="op-btn" onclick="append('+')">+</button>

    <button onclick="toggleSign()">+/-</button>
    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equals" onclick="calculate()">=</button>
</div>

<script>
    let currentInput = "";
    let history = "";

    const resultEl = document.getElementById('result');
    const historyEl = document.getElementById('history');

    function updateDisplay() {
        resultEl.innerText = currentInput || "0";
        historyEl.innerText = history;
        
        // Auto-scale font size if number gets too long
        if (resultEl.innerText.length > 8) {
            resultEl.style.fontSize = "2.5rem";
        } else {
            resultEl.style.fontSize = "4rem";
        }
    }

    function append(char) {
        if (currentInput === "0" && char !== ".") currentInput = "";
        currentInput += char;
        updateDisplay();
    }

    function clearAll() {
        currentInput = "";
        history = "";
        updateDisplay();
    }

    function backspace() {
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
    }

    function calculate() {
        try {
            // Replace visual symbols with JS math symbols
            let logicInput = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
            history = currentInput + " =";
            currentInput = eval(logicInput).toString();
            updateDisplay();
        } catch (e) {
            currentInput = "Error";
            updateDisplay();
        }
    }

    function toggleSign() {
        if (currentInput.startsWith('-')) {
            currentInput = currentInput.substring(1);
        } else {
            currentInput = '-' + currentInput;
        }
        updateDisplay();
    }
</script>

</body>
</html>
