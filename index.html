<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Calculator</title>
    <style>
        :root {
            --bg-black: #000000;
            --btn-gray: #1c1c1e;
            --text-white: #ffffff;
            --text-dim: #8e8e93;
            --accent-orange: #f39c12;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-black);
            font-family: 'sans-serif-light', 'Roboto-Light', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Secret Input Overlay */
        #secret-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        #secret-overlay input {
            width: 80%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 25px);
        }

        .icon-svg {
            width: 22px;
            height: 22px;
            fill: var(--text-dim);
        }

        #display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 20px 30px;
            overflow: hidden;
            width: 100%;
        }

        #result {
            font-size: 5rem;
            color: var(--text-white);
            font-weight: 200;
            text-align: right;
            line-height: 1.2;
            white-space: nowrap;
            /* Allow horizontal scroll but hide scrollbar */
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            scrollbar-width: none;
        }

        #result::-webkit-scrollbar {
            display: none;
        }

        /* Faint Secret Cue */
        #tap-cue {
            position: absolute;
            bottom: 5px;
            right: 15px;
            color: #111; 
            font-size: 0.9rem;
            pointer-events: none;
            display: none;
        }

        #keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 15px;
            padding-bottom: env(safe-area-inset-bottom, 30px);
            background-color: var(--bg-black);
        }

        button {
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: none;
            background-color: var(--btn-gray);
            color: var(--text-white);
            font-size: 1.8rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        button:active { background-color: #3a3a3c; }
        .op-text { color: var(--accent-orange); font-size: 2.2rem; }
        .util-text { color: var(--text-dim); }
        .equals-btn { background-color: var(--accent-orange); color: white; }
        .backspace-svg { width: 26px; fill: var(--text-dim); }
    </style>
</head>
<body onclick="handleGlobalTap(event)">

<div id="secret-overlay">
    <p style="margin-bottom: 10px; color: var(--text-dim);">Set Force Number</p>
    <input type="number" id="force-input" placeholder="0">
    <button onclick="saveForce()" style="width: 150px; height: 50px; border-radius: 10px; background: var(--accent-orange); color: white; font-size: 1rem;">SAVE</button>
</div>

<div class="top-nav">
    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8 4h2v2h-2V7zm0 4h2v2h-2v-2zm-4-4h2v2H7V7zm0 4h2v2H7v-2zm0 4h2v2H7v-2zm10 2h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/></svg>
</div>

<div id="display-container">
    <div id="result">0</div>
    <div id="tap-cue"></div>
</div>

<div id="keypad">
    <button class="util-text" onclick="clearAll()">C</button>
    <button class="util-text" onclick="handlePercent()">%</button>
    <button onclick="backspace()">
        <svg class="backspace-svg" viewBox="0 0 24 24"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg>
    </button>
    <button class="op-text" onclick="append('÷')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="op-text" onclick="append('×')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="op-text" onclick="append('-')">-</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="op-text" onclick="append('+')">+</button>

    <button onclick="toggleSign()">+/-</button>
    <button onclick="append('0')">0</button>
    <button id="dot-btn">.</button>
    <button class="equals-btn" onclick="calculate()">=</button>
</div>

<script>
    let currentInput = "";
    let forceNum = localStorage.getItem("mentalist_force") || ""; 
    let percentCount = 0;
    let percentTimer;
    let isTappingMode = false;
    let forceSequence = [];
    let sequenceIndex = 0;

    const resultEl = document.getElementById('result');
    const cueEl = document.getElementById('tap-cue');
    const dotBtn = document.getElementById('dot-btn');
    const operators = ['+', '-', '×', '÷', '%'];

    function handlePercent() {
        percentCount++;
        clearTimeout(percentTimer);
        if (percentCount === 3) {
            document.getElementById('secret-overlay').style.display = 'flex';
            percentCount = 0;
            if (currentInput.endsWith('%%')) currentInput = currentInput.slice(0, -2);
            updateDisplay();
        } else {
            append('%');
            percentTimer = setTimeout(() => { percentCount = 0; }, 600);
        }
    }

    function saveForce() {
        const val = document.getElementById('force-input').value;
        forceNum = val;
        localStorage.setItem("mentalist_force", val);
        document.getElementById('secret-overlay').style.display = 'none';
        currentInput = "";
        updateDisplay();
    }

    let dotTimer;
    dotBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        dotTimer = setTimeout(activateTappingMode, 800);
    });
    dotBtn.addEventListener('touchend', () => {
        clearTimeout(dotTimer);
        if (!isTappingMode) append('.');
    });
    dotBtn.addEventListener('mousedown', () => dotTimer = setTimeout(activateTappingMode, 800));
    dotBtn.addEventListener('mouseup', () => {
        clearTimeout(dotTimer);
        if (!isTappingMode) append('.');
    });

    function activateTappingMode() {
        if (!forceNum || currentInput === "") return;
        let lastChar = currentInput.slice(-1);
        if (!['+', '×'].includes(lastChar)) return;

        let target = parseFloat(forceNum);
        let mathString = currentInput.slice(0, -1).replace(/×/g, '*').replace(/÷/g, '/');
        
        try {
            let currentTotal = eval(mathString);
            let needed;
            if (lastChar === '+') needed = (target - currentTotal).toString();
            else if (lastChar === '×') {
                needed = (target / currentTotal).toString();
                needed = parseFloat(needed).toFixed(4).replace(/\.?0+$/, "");
            }
            forceSequence = needed.split("");
            sequenceIndex = 0;
            isTappingMode = true;
            cueEl.innerText = forceSequence.length;
            cueEl.style.display = 'block';
        } catch(e) {}
    }

    function handleGlobalTap(event) {
        if (!isTappingMode) return;
        if (sequenceIndex < forceSequence.length) {
            currentInput += forceSequence[sequenceIndex];
            sequenceIndex++;
            updateDisplay();
            cueEl.style.display = 'none';
        }
    }

    function updateDisplay() {
        resultEl.innerText = currentInput || "0";
        let len = resultEl.innerText.length;
        // Adjusted font-size logic for smoother scaling
        if (len > 15) resultEl.style.fontSize = "2.2rem";
        else if (len > 11) resultEl.style.fontSize = "3rem";
        else if (len > 7) resultEl.style.fontSize = "4rem";
        else resultEl.style.fontSize = "5rem";

        // AUTO-SCROLL TO RIGHT
        setTimeout(() => {
            resultEl.scrollLeft = resultEl.scrollWidth;
        }, 0);
    }

    function append(char) {
        if (isTappingMode) return; 
        const lastChar = currentInput.slice(-1);
        if (currentInput === "" && ['×', '÷', '%'].includes(char)) return;
        if (operators.includes(lastChar) && operators.includes(char)) {
            currentInput = currentInput.slice(0, -1) + char;
        } else {
            if (currentInput === "0" && !operators.includes(char) && char !== ".") {
                currentInput = char;
            } else {
                currentInput += char;
            }
        }
        updateDisplay();
    }

    function calculate() {
        try {
            let logicInput = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
            currentInput = eval(logicInput).toString();
            updateDisplay();
            isTappingMode = false;
            forceSequence = [];
            sequenceIndex = 0;
            cueEl.style.display = 'none';
        } catch (e) {
            currentInput = "Error";
            updateDisplay();
        }
    }

    function clearAll() { 
        currentInput = ""; 
        updateDisplay(); 
        isTappingMode = false; 
        cueEl.style.display = 'none'; 
    }

    function backspace() { 
        if(!isTappingMode) { 
            currentInput = currentInput.slice(0, -1); 
            updateDisplay(); 
        } 
    }

    function toggleSign() {
        if (!currentInput || isTappingMode) return;
        currentInput = currentInput.startsWith('-') ? currentInput.slice(1) : '-' + currentInput;
        updateDisplay();
    }
</script>
</body>
</html>
